<!DOCTYPE html>
<html>
<head>
  <title>Contact Us - Fanbox Wallah</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="landingpage">

  <!-- NAVBAR -->
  <div class="navbar">
    <a href="index.html" class="navlogo">FANBOX WALLAH</a>

    <div class="navlinkwrap">
    </div>
  </div>

  <!-- CONTACT SECTION -->
  <div class="box">
    <div class="infobox">

      <p class="infobox-boldtext">
        Contact Us 📞
      </p>

      <p class="infobox-slimtext">
        Feel free to contact us for bulk orders, inquiries or partnerships.
      </p>

      <!-- FORM -->
      <form class="contact-form">

        <input type="text" placeholder="Your Name" required><br><br>

        <input type="email" placeholder="Your Email" required><br><br>

        <input type="text" placeholder="Phone Number"><br><br>

        <textarea placeholder="Your Message" rows="5"></textarea><br><br>

        <button type="submit" class="createbtn selectedbtn">Send Message</button>

      </form>

    </div>
  </div>

  <!-- CONTACT DETAILS -->
  <div class="started">
    <p class="started-boldtext">Our Details</p>

    <div class="started-items">

      <div class="itemwrapper">
        <p>📍 Location: Bhadohi, India</p>
      </div>

      <div class="itemwrapper">
        <p>📞 Phone: +91 9876543210</p>
      </div>

      <div class="itemwrapper">
        <p>📧 Email: fanboxwallah@email.com</p>
      </div>

    </div>
  </div>

</div>

</body>
</html>
