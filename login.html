<!DOCTYPE html>
<html>
<head>
  <title>Login - Fanbox Wallah</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="landingpage">

  <!-- Navbar -->
  <div class="navbar">
    <a href="index.html" class="navlogo">FANBOX WALLAH</a>
  </div>

  <!-- Login Box -->
  <div class="box">
    <div class="infobox">

      <p class="infobox-boldtext">Login 🔐</p>

      <input type="text" id="username" placeholder="Enter Username"><br><br>
      <input type="password" id="password" placeholder="Enter Password"><br><br>

      <button class="createbtn" onclick="login()">Login</button>

      <p id="error" style="color:red; margin-top:10px;"></p>

    </div>
  </div>

</div>

<script>
function login(){
  var user = document.getElementById("username").value;
  var pass = document.getElementById("password").value;

  if(user === "admin" && pass === "1234"){
    alert("Login Successful ✅");
    window.location.href = "index.html";
  } else {
    document.getElementById("error").innerText = "Wrong Username or Password ❌";
  }
}
</script>

</body>
</html>
