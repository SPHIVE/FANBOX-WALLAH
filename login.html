<!DOCTYPE html>
<html>
<head>
<title>Fanbox Wallah - Auth</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  height:100vh;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
}

/* Glass Card */
.glass{
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.1);
  border-radius:20px;
  padding:30px;
  width:320px;
  text-align:center;
  color:white;
  box-shadow:0 0 30px rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.2);
  animation: fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

h2{
  margin-bottom:20px;
}

/* Inputs */
input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  outline:none;
}

/* Buttons */
button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#00ffcc;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#00ccaa;
}

/* Logout button */
.logout-btn{
  background:#ff4d4d;
}

.logout-btn:hover{
  background:#cc0000;
}

/* Close button */
.close{
  position:absolute;
  right:20px;
  top:10px;
  font-size:22px;
  cursor:pointer;
}

/* Hidden */
.hidden{
  display:none;
}

#error{
  color:#ff8080;
  margin-top:10px;
}
</style>

</head>

<body>

<div class="glass">

  <span class="close" onclick="closePage()">&times;</span>

  <h2 id="title">Login 🔐</h2>

  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="password" placeholder="Enter Password">

  <!-- Auth Buttons -->
  <div id="authButtons">
    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign Up</button>
  </div>

  <!-- Logout Section -->
  <div id="logoutSection" class="hidden">
    <p id="welcome"></p>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <p id="error"></p>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDGYdK47Pl3c1ToOEJYNyxxa1SPG3dWEZM",
  authDomain: "fanbox-wallah.firebaseapp.com",
  projectId: "fanbox-wallah",
  appId: "1:679803386087:web:4ac97267c5a413f762ca42"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();


// LOGIN
function login(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
  .catch(err=>{
    document.getElementById("error").innerText = err.message;
  });
}


// SIGNUP
function signup(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
  .catch(err=>{
    document.getElementById("error").innerText = err.message;
  });
}


// LOGOUT
function logout(){
  auth.signOut();
}


// STATE CHANGE (MAIN MAGIC 🔥)
auth.onAuthStateChanged(user => {
  if(user){
    document.getElementById("authButtons").classList.add("hidden");
    document.getElementById("logoutSection").classList.remove("hidden");

    document.getElementById("welcome").innerText = "Welcome 👋 " + user.email;
    document.getElementById("title").innerText = "Dashboard";
  } else {
    document.getElementById("authButtons").classList.remove("hidden");
    document.getElementById("logoutSection").classList.add("hidden");

    document.getElementById("title").innerText = "Login 🔐";
  }
});


// CLOSE PAGE (optional)
function closePage(){
  window.location.href = "index.html";
}

</script>

</body>
</html>
