<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fanbox Wallah - Login</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  font-family:Arial;
}

/* Glass box */
.card{
  width:350px;
  padding:25px;
  border-radius:20px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  color:white;
  box-shadow:0 0 25px rgba(0,0,0,0.4);
  text-align:center;
}

h2{ margin-bottom:15px; }

/* Tabs */
.tab{
  display:flex;
  margin-bottom:15px;
  border-radius:10px;
  overflow:hidden;
}

.tab button{
  flex:1;
  padding:10px;
  border:none;
  cursor:pointer;
  background:#ffffff22;
  color:white;
}

.tab button.active{
  background:#00ffcc;
  color:black;
}

/* Inputs */
input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  outline:none;
}

/* Buttons */
button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.primary{
  background:#00ffcc;
}

.primary:hover{
  background:#00ccaa;
}

.small{
  background:#ff4d4d;
  color:white;
}

#otpBox{ display:none; }

</style>
</head>

<body>

<div class="card">

<h2>Fanbox Login 🔐</h2>

<!-- TAB -->
<div class="tab">
  <button class="active" onclick="showEmail()">Email</button>
  <button onclick="showPhone()">Phone</button>
</div>

<!-- EMAIL LOGIN -->
<div id="emailBox">
  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="password" placeholder="Enter Password">

  <button class="primary" onclick="loginEmail()">Login</button>
  <button class="small" onclick="signupEmail()">Sign Up</button>
</div>

<!-- PHONE LOGIN -->
<div id="phoneBox" style="display:none;">
  <input type="text" id="phone" placeholder="+91XXXXXXXXXX">
  <button class="primary" onclick="sendOTP()">Send OTP</button>

  <div id="otpBox">
    <input type="text" id="otp" placeholder="Enter OTP">
    <button class="primary" onclick="verifyOTP()">Verify OTP</button>
  </div>

  <div id="recaptcha-container"></div>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDGYdK47Pl3c1ToOEJYNyxxa1SPG3dWEZM",
  authDomain: "fanbox-wallah.firebaseapp.com",
  projectId: "fanbox-wallah",
  appId: "1:679803386087:web:4ac97267c5a413f762ca42"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

let confirmationResult;

/* SWITCH UI */
function showEmail(){
  document.getElementById("emailBox").style.display="block";
  document.getElementById("phoneBox").style.display="none";
}

function showPhone(){
  document.getElementById("emailBox").style.display="none";
  document.getElementById("phoneBox").style.display="block";
}

/* EMAIL LOGIN */
function loginEmail(){
  auth.signInWithEmailAndPassword(
    email.value,
    password.value
  ).then(()=>{
    alert("Login Success ✅");
    window.location.href="index.html";
  }).catch(e=>alert(e.message));
}

/* SIGNUP */
function signupEmail(){
  auth.createUserWithEmailAndPassword(
    email.value,
    password.value
  ).then(()=>{
    alert("Account Created ✅");
  }).catch(e=>alert(e.message));
}

/* PHONE OTP */
function sendOTP(){
  let number = document.getElementById("phone").value;

  let appVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container',{
    size:'invisible'
  });

  auth.signInWithPhoneNumber(number, appVerifier)
  .then(result=>{
    confirmationResult = result;
    document.getElementById("otpBox").style.display="block";
    alert("OTP Sent 📩");
  })
  .catch(e=>alert(e.message));
}

function verifyOTP(){
  confirmationResult.confirm(otp.value)
  .then(()=>{
    alert("Login Success ✅");
    window.location.href="index.html";
  })
  .catch(()=>alert("Wrong OTP ❌"));
}

</script>

</body>
</html>
